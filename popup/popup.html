<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>cyshot</title>
    <style>
        body { width: 220px; padding: 8px; margin: 0; font-family: system-ui, sans-serif; background-color: #121212; color: #ffffff; }
        .header-container { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 6px; }
        h3 { margin: 0; font-size: 13px; text-align: left; font-weight: 600; letter-spacing: 0.5px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 11px; }
        .switch { position: relative; display: inline-block; width: 28px; height: 14px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 0; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px; background-color: #999; transition: .3s; border-radius: 0; }
        input:checked + .slider { background-color: #ffffff; }
        input:checked + .slider:before { transform: translateX(14px); background-color: #121212; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
        .action-btn { padding: 6px 2px; cursor: pointer; border-radius: 0; border: none; outline: none; font-size: 10px; font-weight: 600; background-color: #222; color: #ffffff; transition: background 0.2s; text-align: center; }
        .action-btn:hover { background-color: #3a3a3a; }
        .action-btn:active { background-color: #555; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="header-container">
        <h3>cyshot</h3>
    </div>
    
    <div class="toggle-row">
        <span>Enable Capture</span>
        <label class="switch">
            <input type="checkbox" id="toggleKamera">
            <span class="slider"></span>
        </label>
    </div>

    <div class="action-grid">
        <button id="recordBtn" class="action-btn">DOM JSON</button>
        <button id="netTraceBtn" class="action-btn">Net Trace</button>
        <button id="screenCaptureBtn" class="action-btn">Screen Capture</button>
        <button id="recordScreenBtn" class="action-btn">Record Screen</button>
        <button id="exportCookieBtn" class="action-btn">Get Cookie</button>
        <button id="importCookieBtn" class="action-btn">Set Cookie</button>
        <button id="imgExtractBtn" class="action-btn">Extract Images</button>
        <button id="vidExtractBtn" class="action-btn">Extract Video</button>
        <button id="extractAllBtn" class="action-btn full-width">Extract All</button>
    </div>
    
    <input type="file" id="cookieFile" style="display:none" accept=".json">
    <script src="popup.js"></script>
</body>
</html>
